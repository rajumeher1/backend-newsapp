name: RSS Cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/rss-runner:latest

    steps:
      - name: Run RSS Fetcher
        env:
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python -m cron.main