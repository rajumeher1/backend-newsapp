name: RSS Fetcher Cron

on:
  workflow_dispatch:
  schedule:
    # Runs at 15 and 45 minutes past every hour from 0 to 17 UTC
    - cron: "15,45 0-17 * * *"

concurrency:
  group: rss-fetcher
  cancel-in-progress: false

jobs:
  run-rss:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # # 3️⃣ Cache pip downloads (fast install)
      # - name: Cache pip
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/pip
      #     key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      # # 4️⃣ Cache Hugging Face models
      # - name: Cache Hugging Face
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/huggingface
      #     key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      # 5️⃣ Cache venv
      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-

      # 6️⃣ Create venv and install dependencies if cache missed
      - name: Create venv and install dependencies
        run: |
          if [ "${{ steps.cache-venv.outputs.cache-hit }}" != "true" ]; then
            python -m venv .venv
            source .venv/bin/activate
            python -m pip install --upgrade pip
            pip install --prefer-binary -r requirements.txt
          else
            echo "Restoring .venv from cache"
            source .venv/bin/activate
          fi

      # 7️⃣ Run RSS Fetcher
      - name: Run RSS Fetcher
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          source .venv/bin/activate
          python -m cron.main